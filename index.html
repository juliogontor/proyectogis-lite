<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoportal Lite</title>
    
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@geomatico/maplibre-cog-protocol@0.5.0/dist/index.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        
        /* Contenedor del Mapa (Oculto por defecto) */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; display: none; }

        /* Pantalla de Login */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f7f6;
        }

        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        #btn-logout {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background-color: #d9534f;
            padding: 8px 15px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>Geoportal Tonalá</h2>
            <p>Inicie sesión para acceder a los datos cartográficos</p>
            <button id="btn-login">Entrar con Google</button>
        </div>
    </div>

    <button id="btn-logout">Cerrar Sesión</button>
    <div id="map"></div>

    <script>
        const SB_URL = "https://zamaouqtwtiapibscmaf.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphbWFvdXF0d3RpYXBpYnNjbWFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjY1ODMsImV4cCI6MjA4ODk0MjU4M30.Uzzr40xDGUyRYbnjoTFNt7ridzb8F1UFjBglo35coPE";

        // Inicializar Supabase
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Elementos UI
        const loginScreen = document.getElementById('login-screen');
        const mapContainer = document.getElementById('map');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');

        // --- LÓGICA DE AUTENTICACIÓN ---

        btnLogin.onclick = async () => {
            await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        };

        btnLogout.onclick = async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        };

        // Escuchar cambios de sesión
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                // Usuario Autenticado
                loginScreen.style.display = 'none';
                mapContainer.style.display = 'block';
                btnLogout.style.display = 'block';
                iniciarMapa(); // Llamamos a la función del mapa
            } else {
                // Usuario No Autenticado
                loginScreen.style.display = 'flex';
                mapContainer.style.display = 'none';
                btnLogout.style.display = 'none';
            }
        });

        // --- FUNCIÓN DEL MAPA (Tu código anterior) ---

        function iniciarMapa() {
            // Registrar protocolos
            maplibregl.addProtocol('supabase', async (params) => {
                const url = params.url.replace('supabase://', 'https://');
                const response = await fetch(url, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });
                const json = await response.json();
                const base64 = json; 
                if (!base64) return { data: new Uint8Array(0).buffer };
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
                return { data: bytes.buffer };
            });

            maplibregl.addProtocol('cog', MaplibreCOGProtocol.cogProtocol);

            const map = new maplibregl.Map({
                container: 'map',
                style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json', 
                center: [-102.50942, 20.55079],
                zoom: 14
            });

            map.on('load', () => {
                map.addSource('cogSource', {
                    type: 'raster',
                    url: 'cog://https://zamaouqtwtiapibscmaf.supabase.co/storage/v1/object/public/rasters/atoto2.tif',
                    tileSize: 256
                });

                map.addLayer({
                    id: 'cogLayer',
                    source: 'cogSource',
                    type: 'raster'
                });

                map.addSource('predio', {
                    type: 'vector',
                    tiles: [`supabase://${SB_URL.replace('https://','')}/rest/v1/rpc/get_predio_mvt?x={x}&y={y}&z={z}`]
                });

                map.addLayer({
                    'id': 'predio-layer',
                    'type': 'fill',
                    'source': 'predio',
                    'source-layer': 'predio',
                    'paint': {
                        'fill-color': '#00ff00',
                        'fill-opacity': 0.5,
                        'fill-outline-color': '#006600'
                    }
                });
            });
        }
    </script>
</body>
</html>
